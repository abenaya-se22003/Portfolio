<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <!-- Background radial gradient to give a soft, subtle glow -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#13131f" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="1"/>
    </radialGradient>
    <!-- Linear gradient for the A glyph -->
    <linearGradient id="a-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>   <!-- Indigo/Purple light -->
      <stop offset="50%" stop-color="#8b5cf6"/>  <!-- Purple accent -->
      <stop offset="100%" stop-color="#6366f1"/> <!-- Indigo accent -->
    </linearGradient>
    <!-- White core highlight gradient -->
    <linearGradient id="white-core" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#8b5cf6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Container/Background Squircle with glowing border -->
  <rect x="4" y="4" width="120" height="120" rx="32" fill="url(#bg-glow)" stroke="url(#a-grad)" stroke-width="3" filter="url(#soft-shadow)" />

  <!-- Monogram A -->
  <!-- Left Pillar -->
  <path d="M44 88 L64 36" stroke="url(#a-grad)" stroke-width="10" stroke-linecap="round"/>
  <!-- Right Pillar -->
  <path d="M64 38 L84 88" stroke="url(#a-grad)" stroke-width="10" stroke-linecap="round"/>
  <!-- Clean horizontal crossbar with white contrast highlight -->
  <path d="M53 70 H75" stroke="url(#white-core)" stroke-width="8" stroke-linecap="round"/>
</svg>